<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
    /* Fundo Infinito e Bloqueio de Rolagem */
    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(to right, #000a24 0%, #000000 15%, #000000 85%, #000a24 100%);
        color: #ffffff;
        height: 100vh; 
        overflow: hidden; 
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
    }

    /* Container Principal */
    .header-container {
        width: 100%;
        max-width: 850px;
        height: 100%; 
        padding: clamp(15px, 4vh, 40px) 20px; 
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; 
        gap: clamp(8px, 2.5vh, 25px); 
        text-align: center;
    }

    /* Insígnia Animada - Matemática Corrigida (Min, Ideal, Max) */
    .insignia-animada {
        width: auto;
        max-width: 100%;
        height: auto;
        max-height: clamp(60px, 15vh, 130px); 
        display: block;
        margin: 0; 
        animation: floatAndGlow 4s ease-in-out infinite;
    }

    @keyframes floatAndGlow {
        0% { transform: translateY(0px); filter: drop-shadow(0 0 10px rgba(218, 165, 32, 0.3)); }
        50% { transform: translateY(-6px); filter: drop-shadow(0 0 25px rgba(218, 165, 32, 0.8)); }
        100% { transform: translateY(0px); filter: drop-shadow(0 0 10px rgba(218, 165, 32, 0.3)); }
    }

    /* Caixa de Acesso */
    .caixa-acesso {
        background: #060606; 
        padding: clamp(10px, 2vh, 18px) 30px;
        border-radius: 10px;
        border: 1px solid rgba(218, 165, 32, 0.3); 
        max-width: 650px;
        width: 90%;
        margin: 0;
        transition: all 0.3s ease;
    }
    
    .caixa-acesso:hover {
        border: 1px solid rgba(218, 165, 32, 0.7);
        box-shadow: 0 0 20px rgba(218, 165, 32, 0.1);
    }

    .titulo-acesso {
        font-size: clamp(11px, 2vw, 14px);
        color: #DAA520; 
        margin: 0 0 4px 0;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .texto-acesso {
        font-size: clamp(10px, 2vw, 14px);
        color: #AAAAAA; 
        margin: 0;
        line-height: 1.5;
        font-weight: 300;
    }

    /* ========================================================
       A REGRA DE OURO PARA CELULARES (MEDIA QUERY)
       Quando a tela for menor que 600px, isso é ativado
       ======================================================== */
    @media (max-width: 600px), (max-height: 550px) {
        .header-container {
            padding: 10px 15px; 
            gap: 8px; 
        }
        .insignia-animada {
            max-height: 65px; 
        }
        .caixa-acesso {
            padding: 12px 15px;
            width: 95%; 
        }
    }
</style>
</head>
<body>
    <div class="header-container">
        <img class="insignia-animada" src="https://api-club-file.cb.hotmart.com/public/v5/files/02b95a8a-8082-4219-81d6-45d91ec7089d" alt="Insígnia Certificação Master NLS">

        <section class="caixa-acesso">
            <p class="titulo-acesso">🔒 ACESSO RESTRITO</p>
            <p class="texto-acesso">Faça o login na sua conta Google para acessar os Materiais.</p>
        </section>
    </div>
</body>
</html>
